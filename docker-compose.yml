version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./chroma_db:/app/chroma_db
      - ./pipeline_logs.jsonl:/app/pipeline_logs.jsonl
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
